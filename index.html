<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yatra.lv — Drīzumā</title>
  <meta name="description" content="Ājurvēdas retrīts Keralā ar Svami Viśvasaradnandu un Narayanaanandu. 14.12.–28.12.2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1510, #2c2118, #3a2f1e);
      font-family: 'Inter', system-ui, sans-serif;
      color: #fff;
      padding: 2rem;
    }

    .page {
      text-align: center;
      max-width: 560px;
    }

    .logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 400;
      letter-spacing: .06em;
      margin-bottom: .5rem;
    }

    .divider {
      width: 50px;
      height: 1px;
      background: rgba(201, 168, 76, .5);
      margin: 1.5rem auto;
    }

    .badge {
      display: inline-block;
      font-size: .75rem;
      font-weight: 400;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 2rem;
    }

    .desc {
      font-size: clamp(.95rem, 2.5vw, 1.05rem);
      font-weight: 300;
      line-height: 1.8;
      color: rgba(255, 255, 255, .65);
      margin-bottom: 2.5rem;
    }

    .contact {
      font-size: .9rem;
      color: rgba(255, 255, 255, .4);
    }

    .contact a {
      color: #c9a84c;
      text-decoration: none;
    }

    .contact a:hover { text-decoration: underline; }

    .contact span { margin: 0 .5rem; }
  </style>
</head>
<body>
  <div class="page">
    <h1 class="logo">Yatra</h1>
    <div class="divider"></div>
    <p class="badge">Drīzumā</p>
    <p class="desc">Ājurvēdas retrīts Keralā — dziļa dziedināšana, Pancakarma, garīgās prakses un svētceļojumi uz seniem Indijas tempļiem. Ceļojums ar Svami Viśvasaradnandu un Narayanaanandu.</p>
    <p class="contact">
      <a href="mailto:toms.liepins@gmail.com">toms.liepins@gmail.com</a>
      <span>&middot;</span>
      <a href="tel:+37129221141">+371 29 221 141</a>
    </p>
  </div>
</body>
</html>
